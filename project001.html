<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./general.css">
  <link rel="stylesheet" href="./header.css">
  <link rel="stylesheet" href="./product.css">
  <title>Project 001</title>
</head>
<body>
  <header>
    <img class="logo-pic" src="./Thumbnails/Merchants logo.png" alt="Merchants logo">
    <input type="text" placeholder="Search">
    <a href="./Cart.html" class="cart">
      <div class="icon-container">
        <div class="cart-number">1</div>
        <img class="cart-icon" src="./Icons/cart-icon.png" alt="Icon">
      </div>   
      <div>Cart</div>
    </a>
  </header>

  <div class="all-products">
    <div class="product">
    <div>
      <img class="product-image" src="./Thumbnails/air force.webp" alt="Air Force 1">
    </div>
    <div class="product-info">Air Force 1</div>
    <div class="product-price">Ksh 2,000</div>
    <button class="btn">Add to Cart</button>
  </div>

  <div class="product">
    <div>
      <img class="product-image" src="./Thumbnails/adidas samba.webp" alt="Air Force 1">
    </div>
    <div class="product-info">Adidas Samba</div>
    <div class="product-price">Ksh 2,000</div>
    <button class="btn">Add to Cart</button>
  </div>
  </div>
</body>
</html>
